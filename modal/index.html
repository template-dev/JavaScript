<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Modal</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="app.js"></script>
</head>
<body>
    <button id="openModalBtn" class="open-btn">Open Modal</button>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Beautiful Modal Window</h2>
                <button class="close" id="closeModalBtn" aria-label="Close modal">&times;</button>
            </div>

            <p class="modal-text">
                This is a modern modal window with a smooth animation, a soft shadow,
                and a blurred background. It looks much cleaner than the default version.
            </p>

            <div class="modal-actions">
                <button class="btn-secondary" id="cancelBtn">Cancel</button>
                <button class="btn-primary">Confirm</button>
            </div>
        </div>
    </div>
</body>
</html>
